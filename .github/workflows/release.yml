name: Publish release download

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Run tests
        run: python scripts/run_tests.py

      - name: Build downloadable ZIP
        run: |
          python scripts/build_release.py --output dist/surfing-ai.zip
          sha256sum dist/surfing-ai.zip > dist/surfing-ai.zip.sha256

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            dist/surfing-ai.zip \
            dist/surfing-ai.zip.sha256 \
            --verify-tag \
            --generate-notes \
            --title "Surfing AI ${GITHUB_REF_NAME}"

  # Lite builds: no Rust/Node toolchain, guaranteed artifacts.
  desktop-lite-macos:
    name: Lite .dmg (macOS, no toolchain)
    needs: release
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build .app bundle and .dmg
        run: python3 scripts/build_desktop_app.py --output dist --dmg --zip

      - name: Upload artifacts (always)
        uses: actions/upload-artifact@v4
        with:
          name: surfing-ai-desktop-lite-macos
          path: |
            dist/*.dmg
            dist/*.zip

      - name: Upload to the release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" dist/*.dmg dist/*.zip \
            --clobber

  desktop-lite-windows:
    name: Lite .exe (Windows, PyInstaller)
    needs: release
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build .exe
        shell: bash
        run: |
          pip install pyinstaller
          pyinstaller --noconfirm --onefile --windowed \
            --name SurfingAI-Desktop \
            --icon desktop/src-tauri/icons/icon.ico \
            --add-data "harness;harness" \
            --add-data "desktop/ui;desktop/ui" \
            --add-data "scripts;scripts" \
            packaging/desktop_entry.py

      - name: Upload artifacts (always)
        uses: actions/upload-artifact@v4
        with:
          name: surfing-ai-desktop-lite-windows
          path: dist/SurfingAI-Desktop.exe

      - name: Upload to the release
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            dist/SurfingAI-Desktop.exe --clobber

  desktop:
    name: Desktop app (${{ matrix.os }})
    needs: release
    continue-on-error: true   # lite jobs above guarantee the artifacts
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            args: "--target universal-apple-darwin"
          - os: ubuntu-22.04
            args: ""
          - os: windows-latest
            args: ""
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS universal targets
        if: matrix.os == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install Linux webview dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev \
            libappindicator3-dev librsvg2-dev patchelf

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install Tauri CLI
        shell: bash
        run: cargo binstall tauri-cli --no-confirm

      - name: Build desktop bundles
        shell: bash
        working-directory: desktop/src-tauri
        run: cargo tauri build ${{ matrix.args }}

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-failure-${{ matrix.os }}
          path: desktop/src-tauri/target/**/*.log
          if-no-files-found: ignore

      - name: Upload bundles to the release
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          shopt -s nullglob globstar
          files=(desktop/src-tauri/target/**/release/bundle/dmg/*.dmg
                 desktop/src-tauri/target/**/release/bundle/appimage/*.AppImage
                 desktop/src-tauri/target/**/release/bundle/deb/*.deb
                 desktop/src-tauri/target/**/release/bundle/nsis/*.exe
                 desktop/src-tauri/target/**/release/bundle/msi/*.msi)
          if [ ${#files[@]} -eq 0 ]; then
            echo "no bundles found"; exit 1
          fi
          gh release upload "${GITHUB_REF_NAME}" "${files[@]}" --clobber
