<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Surfing AI — Private Desktop</title>
<style>
  :root {
    --bg: #0d1117; --panel: #161b22; --border: #30363d;
    --text: #c9d1d9; --dim: #8b949e; --accent: #58a6ff;
    --green: #3fb950; --red: #f85149; --yellow: #d29922;
    --mono: "SF Mono", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; margin: 0; }
  body { background: var(--bg); color: var(--text);
         font: 13px var(--mono); height: 100vh;
         display: flex; flex-direction: column; overflow: hidden; }

  /* top bar */
  #bar { display: flex; align-items: center; gap: 8px;
         padding: 6px 10px; background: var(--panel);
         border-bottom: 1px solid var(--border); }
  select, button { background: #21262d; color: var(--text);
                   border: 1px solid var(--border); border-radius: 6px;
                   font: inherit; padding: 4px 8px; cursor: pointer; }
  button:hover { border-color: var(--accent); }
  #maxbtn { color: var(--yellow); }
  #brand { margin-left: auto; color: var(--dim); font-size: 11px; }
  #hint { color: var(--dim); font-size: 11px; }

  /* split tree */
  #grid { flex: 1; display: flex; min-height: 0; min-width: 0; }
  .split { display: flex; flex: 1; min-height: 0; min-width: 0; gap: 1px;
           background: var(--border); }
  .split.row { flex-direction: row; }
  .split.col { flex-direction: column; }
  .pane { flex: 1; background: var(--bg); display: flex;
          flex-direction: column; min-height: 0; min-width: 0;
          outline: 1px solid var(--border); }
  .pane.focused { outline: 1px solid var(--accent); z-index: 1; }
  .pane h2 { font-size: 11px; font-weight: 600; color: var(--dim);
             text-transform: uppercase; letter-spacing: .08em;
             padding: 4px 10px; background: var(--panel);
             border-bottom: 1px solid var(--border); display: flex;
             gap: 8px; align-items: center; cursor: default;
             user-select: none; white-space: nowrap; overflow: hidden; }
  .pane h2 .mode { color: var(--accent); text-transform: none; }
  .body { flex: 1; overflow-y: auto; padding: 6px 10px;
          white-space: pre-wrap; word-break: break-word; }

  .line-input  { color: var(--accent); }
  .line-result { color: var(--text); }
  .line-info   { color: var(--dim); }
  .line-blocked{ color: var(--red); }
  form.repl { display: flex; border-top: 1px solid var(--border); }
  form.repl .prompt { padding: 6px 0 6px 10px; color: var(--green); }
  form.repl input { flex: 1; background: transparent; border: 0;
                    outline: none; color: var(--text); font: inherit;
                    padding: 6px 10px; min-width: 0; }

  .approval-card { border: 1px solid var(--yellow); border-radius: 8px;
                   padding: 10px; margin-bottom: 10px; }
  .approval-card pre { white-space: pre-wrap; word-break: break-word;
                       margin: 8px 0; max-height: 160px; overflow-y: auto; }
  .approve { border-color: var(--green); color: var(--green); }
  .deny    { border-color: var(--red); color: var(--red);
             margin-left: 8px; }

  /* capabilities */
  .cap-summary { border: 1px solid var(--border); border-radius: 8px;
                 padding: 8px 10px; margin-bottom: 10px;
                 color: var(--dim); }
  .cap-summary b { color: var(--green); }
  .cap-group { color: var(--dim); font-size: 10px;
               text-transform: uppercase; letter-spacing: .08em;
               margin: 10px 0 4px; }
  .cap-row { display: flex; align-items: center; gap: 8px;
             padding: 3px 0; }
  .cap-row .nm { flex: 1; overflow: hidden; text-overflow: ellipsis;
                 white-space: nowrap; }
  .cap-row .tk { color: var(--dim); font-size: 11px; }
  .tg { min-width: 52px; font-size: 11px; padding: 2px 8px; }
  .tg.on  { border-color: var(--green); color: var(--green); }
  .tg.off { border-color: var(--border); color: var(--dim); }

  .vocab-present, .vocab-ok { color: var(--green); }
  .vocab-missing, .vocab-failed { color: var(--red); }
  .vocab-not_configured { color: var(--yellow); }
  .empty { color: var(--dim); padding: 14px; text-align: center; }

  /* security gauge pane */
  .gauge-pane { padding: 12px 10px; overflow-y: auto; }
  .gauge-grid { display: flex; gap: 10px; flex-wrap: wrap;
                justify-content: center; margin-bottom: 14px; }
  .gauge-card { display: flex; flex-direction: column; align-items: center;
                background: #161b22; border: 1px solid var(--border);
                border-radius: 10px; padding: 10px 8px 8px;
                min-width: 110px; flex: 1; max-width: 150px;
                cursor: pointer; transition: border-color .15s; }
  .gauge-card.active { border-color: var(--accent); }
  .gauge-card.locked { opacity: .6; }
  .gauge-card:hover { border-color: var(--dim); }
  .gauge-card.active:hover { border-color: var(--accent); }
  .gauge-label { font-size: 10px; font-weight: 700; letter-spacing: .08em;
                 margin-bottom: 4px; text-transform: uppercase; }
  .gauge-svg { width: 100%; max-width: 120px; height: 70px;
               touch-action: none; cursor: grab; }
  .gauge-desc { font-size: 9px; color: var(--dim); text-align: center;
                margin: 4px 0 6px; line-height: 1.4; min-height: 26px; }
  .gauge-models { font-size: 9px; color: var(--dim); text-align: center;
                  margin-bottom: 6px; word-break: break-word; }
  .gauge-btns { display: flex; gap: 6px; }
  .g-set  { font-size: 10px; padding: 2px 7px;
            border-color: var(--accent); color: var(--accent); }
  .g-lock { font-size: 10px; padding: 2px 7px; }
  .g-lock.locked { border-color: var(--red); color: var(--red); }
  .g-lock.unlocked { border-color: var(--border); color: var(--dim); }
  .gauge-current-bar { border: 1px solid var(--border); border-radius: 8px;
                       padding: 8px 10px; font-size: 11px; color: var(--dim);
                       margin-bottom: 10px; line-height: 1.6; }
  .gauge-current-bar b { color: var(--text); }
  .gauge-current-bar .glevel { font-weight: 700; font-size: 13px; }

  /* context menu */
  #ctx { position: fixed; display: none; z-index: 99; min-width: 210px;
         background: var(--panel); border: 1px solid var(--border);
         border-radius: 8px; padding: 4px; box-shadow: 0 8px 24px #000a; }
  #ctx .item { padding: 6px 12px; border-radius: 6px; cursor: pointer;
               white-space: nowrap; }
  #ctx .item:hover { background: #21262d; color: var(--accent); }
  #ctx .sep { height: 1px; background: var(--border); margin: 4px 6px; }
  #ctx .label { padding: 4px 12px; color: var(--dim); font-size: 10px;
                text-transform: uppercase; letter-spacing: .08em; }

  /* status bar */
  #status { display: flex; gap: 16px; padding: 4px 10px; font-size: 11px;
            color: var(--dim); background: var(--panel);
            border-top: 1px solid var(--border); }
  #status .ok { color: var(--green); }
  #status .bad { color: var(--red); }
</style>
</head>
<body>
  <div id="bar">
    <select id="newmode">
      <option value="local-only">local-only</option>
      <option value="redacted-external">redacted-external</option>
      <option value="audit">audit</option>
    </select>
    <button id="addbtn">+ terminal</button>
    <button id="maxbtn" title="fill the grid with one terminal per CPU core">⚡ max procs</button>
    <button id="capsbtn" title="enable/disable MCP servers, skills, plugins">⛭ capabilities</button>
    <button id="gaugebtn" title="security gauge — 5-level model &amp; routing access">🔒 security</button>
    <span id="hint">right-click a pane to split / close / change type</span>
    <span id="brand">surfing_ai private desktop</span>
  </div>

  <div id="grid"></div>

  <div id="ctx"></div>

  <div id="status">
    <span id="s-mode"></span>
    <span id="s-blocked"></span>
    <span id="s-external"></span>
    <span id="s-files"></span>
    <span id="s-procs"></span>
    <span id="s-tokens" title="local file-size arithmetic — zero model tokens spent on this number"></span>
    <span id="s-gauge" title="security gauge level"></span>
    <span id="s-audit" style="margin-left:auto"></span>
  </div>

<script>
"use strict";
const TOKEN = new URLSearchParams(location.search).get("token") || "";
const HEADERS = { "Content-Type": "application/json",
                  "X-Bridge-Token": TOKEN };

async function api(path, method = "GET", body = null) {
  const res = await fetch(path, { method, headers: HEADERS,
    body: body ? JSON.stringify(body) : null });
  return res.json();
}

/* ================= split-tree layout ================= */
let nextPid = 1;
let layout = null;        // {type:'pane',pid} | {type:'split',dir,children}
const panes = new Map();  // pid -> {kind:'terminal'|'approvals'|'health', session}
let focused = null;       // pid
const states = new Map(); // sessionId -> last state

function newPane(kind, session = null) {
  const pid = nextPid++;
  panes.set(pid, { kind, session });
  return { type: "pane", pid };
}

function findParent(node, pid, parent = null) {
  if (node.type === "pane") return node.pid === pid ? parent : null;
  for (const child of node.children) {
    const hit = findParent(child, pid, node);
    if (hit !== null) return hit;
  }
  return null;
}

function findNode(node, pid) {
  if (node.type === "pane") return node.pid === pid ? node : null;
  for (const child of node.children) {
    const hit = findNode(child, pid);
    if (hit) return hit;
  }
  return null;
}

function splitPane(pid, dir, newLeaf) {
  const node = findNode(layout, pid);
  if (!node) return;
  const clone = { type: "pane", pid: node.pid };
  node.type = "split"; node.dir = dir;
  node.children = [clone, newLeaf];
  delete node.pid;
  renderLayout();
}

async function removePane(pid) {
  const info = panes.get(pid);
  if (info && info.kind === "terminal" && info.session !== null) {
    await api(`/api/sessions/${info.session}/close`, "POST", {});
  }
  panes.delete(pid);
  if (layout.type === "pane" && layout.pid === pid) {
    layout = null;
  } else {
    const parent = findParent(layout, pid);
    if (parent) {
      parent.children = parent.children.filter(
        c => !(c.type === "pane" && c.pid === pid));
      if (parent.children.length === 1) {
        Object.assign(parent, parent.children[0]);
        if (parent.type === "pane") delete parent.children;
      }
    }
  }
  if (focused === pid) focused = firstTerminalPid();
  renderLayout();
}

function allPids(node = layout, out = []) {
  if (!node) return out;
  if (node.type === "pane") { out.push(node.pid); return out; }
  node.children.forEach(c => allPids(c, out));
  return out;
}

function firstTerminalPid() {
  return allPids().find(pid => panes.get(pid).kind === "terminal") ?? null;
}

function buildTiled(pidList) {
  // near-square grid: rows of row-splits inside one column split
  const n = pidList.length;
  const cols = Math.ceil(Math.sqrt(n));
  const rows = [];
  for (let i = 0; i < n; i += cols) {
    const slice = pidList.slice(i, i + cols)
      .map(pid => ({ type: "pane", pid }));
    rows.push(slice.length === 1 ? slice[0]
      : { type: "split", dir: "row", children: slice });
  }
  layout = rows.length === 1 ? rows[0]
    : { type: "split", dir: "col", children: rows };
}

/* ================= rendering ================= */
function renderLayout() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  if (!layout) {
    grid.innerHTML = '<div class="empty" style="margin:auto">' +
      '+ terminal to start</div>';
    return;
  }
  grid.appendChild(renderNode(layout));
  refreshAll();
}

function renderNode(node) {
  if (node.type === "split") {
    const div = document.createElement("div");
    div.className = `split ${node.dir}`;
    node.children.forEach(c => div.appendChild(renderNode(c)));
    return div;
  }
  return renderPane(node.pid);
}

function renderPane(pid) {
  const info = panes.get(pid);
  const div = document.createElement("div");
  div.className = "pane" + (pid === focused ? " focused" : "");
  div.dataset.pid = pid;
  div.onmousedown = () => { if (focused !== pid) { focused = pid;
    markFocus(); updateStatus(); } };
  div.oncontextmenu = (e) => { e.preventDefault(); openMenu(e, pid); };

  const h2 = document.createElement("h2");
  if (info.kind === "terminal") {
    h2.innerHTML = `terminal <span class="mode" id="ph-${pid}">` +
      (info.session ? `#${info.session}` : "…") + `</span>`;
    const out = document.createElement("div");
    out.className = "body"; out.id = `out-${pid}`;
    const form = document.createElement("form");
    form.className = "repl";
    form.innerHTML = `<span class="prompt">private&gt;</span>` +
      `<input id="in-${pid}" autocomplete="off" spellcheck="false"` +
      ` placeholder=":help">`;
    form.onsubmit = (e) => { e.preventDefault(); submitLine(pid); };
    div.append(h2, out, form);
  } else if (info.kind === "capabilities") {
    h2.textContent = "capabilities — mcp / skills / plugins";
    const body = document.createElement("div");
    body.className = "body"; body.id = `caps-${pid}`;
    body.innerHTML = '<div class="empty">loading…</div>';
    div.append(h2, body);
    setTimeout(() => loadCapsPane(pid), 0);
  } else if (info.kind === "gauge") {
    h2.textContent = "security gauge — model & routing access";
    const body = document.createElement("div");
    body.className = "body gauge-pane"; body.id = `gauge-${pid}`;
    body.innerHTML = '<div class="empty">loading…</div>';
    div.append(h2, body);
    setTimeout(() => loadGaugePane(pid), 0);
  } else if (info.kind === "approvals") {
    h2.textContent = "approvals (focused session)";
    const body = document.createElement("div");
    body.className = "body"; body.id = `appr-${pid}`;
    body.innerHTML = '<div class="empty">none</div>';
    div.append(h2, body);
  } else {
    h2.innerHTML = `backend health <button id="hb-${pid}"
      style="font-size:10px;margin-left:auto">refresh</button>`;
    const body = document.createElement("div");
    body.className = "body"; body.id = `health-${pid}`;
    body.innerHTML = '<div class="empty">press refresh</div>';
    div.append(h2, body);
    setTimeout(() => {
      const b = document.getElementById(`hb-${pid}`);
      if (b) b.onclick = () => loadHealth(pid);
    }, 0);
  }
  return div;
}

function markFocus() {
  document.querySelectorAll(".pane").forEach(p =>
    p.classList.toggle("focused", Number(p.dataset.pid) === focused));
}

function renderTerminal(pid, state) {
  const out = document.getElementById(`out-${pid}`);
  const head = document.getElementById(`ph-${pid}`);
  if (!out) return;
  if (head) head.textContent = `#${state.id} ${state.mode}`;
  const stick = out.scrollTop + out.clientHeight >= out.scrollHeight - 8;
  out.innerHTML = "";
  for (const line of state.output) {
    const div = document.createElement("div");
    let cls = "line-" + line.kind;
    if (line.text.startsWith("BLOCKED")) cls = "line-blocked";
    div.className = cls;
    div.textContent = (line.kind === "input" ? "private> " : "") + line.text;
    out.appendChild(div);
  }
  if (stick) out.scrollTop = out.scrollHeight;
}

function renderApprovals() {
  const state = focusedState();
  document.querySelectorAll('[id^="appr-"]').forEach(el => {
    el.innerHTML = "";
    if (state && state.pending) {
      const card = document.createElement("div");
      card.className = "approval-card";
      const pre = document.createElement("pre");
      pre.textContent = state.pending.preview;
      const yes = document.createElement("button");
      yes.className = "approve"; yes.textContent = "approve & send";
      yes.onclick = () => decide(state.id, true);
      const no = document.createElement("button");
      no.className = "deny"; no.textContent = "deny (default)";
      no.onclick = () => decide(state.id, false);
      card.append(pre, yes, no);
      el.appendChild(card);
    } else if (!state || !state.approvals_pending.length) {
      el.innerHTML = '<div class="empty">none</div>';
    }
    if (state) {
      for (const r of state.approvals_pending) {
        const div = document.createElement("div");
        div.className = "line-info";
        div.textContent = `#${r.id} ${r.label}`;
        el.appendChild(div);
      }
    }
  });
}

async function loadHealth(pid) {
  const h = await api("/api/health");
  const el = document.getElementById(`health-${pid}`);
  if (!el) return;
  el.innerHTML = "";
  for (const row of h.rows) {
    const div = document.createElement("div");
    div.innerHTML =
      `${row.backend}: binary=<span class="vocab-${row.binary}">` +
      `${row.binary}</span> auth=<span class="vocab-${row.auth}">` +
      `${row.auth}</span> api_key=<span class="vocab-${row.api_key}">` +
      `${row.api_key}</span>`;
    el.appendChild(div);
  }
}

/* ---- capabilities (token math is local arithmetic, zero tokens) ---- */
let capsSummary = null;

function renderTokenStatus() {
  if (!capsSummary) return;
  setStatus("s-tokens",
    `tokens saved/req ≈${capsSummary.saved_tokens_per_request}` +
    ` (${capsSummary.saved_percent}%)`,
    capsSummary.saved_tokens_per_request > 0 ? "ok" : "");
}

async function loadCapsSummary() {
  const data = await api("/api/capabilities").catch(() => null);
  if (data && data.summary) { capsSummary = data.summary;
    renderTokenStatus(); }
  return data;
}

async function loadCapsPane(pid) {
  const data = await loadCapsSummary();
  const el = document.getElementById(`caps-${pid}`);
  if (!el || !data) return;
  el.innerHTML = "";
  const s = data.summary;
  const sum = document.createElement("div");
  sum.className = "cap-summary";
  sum.innerHTML =
    `saved per request: <b>≈${s.saved_tokens_per_request} tokens</b> ` +
    `(${s.saved_percent}%) · per 100 requests: ` +
    `<b>≈${s.saved_tokens_per_100_requests}</b><br>` +
    `enabled ${s.enabled_count}/${s.capabilities} · baseline ` +
    `≈${s.baseline_tokens_per_request} tok/req · ` +
    `computed locally — zero model tokens`;
  el.appendChild(sum);

  const groups = { mcp: "mcp servers", skill: "skills",
                   plugin: "plugins" };
  for (const kind of Object.keys(groups)) {
    const caps = data.capabilities.filter(c => c.kind === kind);
    const head = document.createElement("div");
    head.className = "cap-group";
    head.textContent = groups[kind] + (caps.length ? "" : " — none found");
    el.appendChild(head);
    for (const cap of caps) {
      const row = document.createElement("div");
      row.className = "cap-row";
      const btn = document.createElement("button");
      btn.className = "tg " + (cap.enabled ? "on" : "off");
      btn.textContent = cap.enabled ? "ON" : "OFF";
      btn.onclick = () => toggleCap(cap.id, !cap.enabled, pid);
      const nm = document.createElement("span");
      nm.className = "nm"; nm.textContent = cap.name;
      nm.title = cap.source;
      const tk = document.createElement("span");
      tk.className = "tk"; tk.textContent = `≈${cap.est_tokens} tok`;
      row.append(btn, nm, tk);
      el.appendChild(row);
    }
  }
}

async function toggleCap(id, enabled, pid) {
  const r = await api("/api/capabilities/toggle", "POST", { id, enabled });
  if (r.error) return alert(r.error);
  await loadCapsPane(pid);
}

/* ===================== security gauge ===================== */

let gaugeData = null;  // last fetched listing from /api/gauge

// ── SVG semicircle gauge builder ────────────────────────────────────────────
// cx,cy = center of flat base; r = radius; value ∈ [0,1]; color = stroke color
// Returns an SVG element. The gauge arc goes from 180° (left) to 0° (right).

function buildGaugeSvg(levelIdx, value, color, isActive, isLocked) {
  const W = 120, H = 70;
  const cx = W / 2, cy = H - 8, r = 50;

  const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
  svg.setAttribute("viewBox", `0 0 ${W} ${H}`);
  svg.classList.add("gauge-svg");
  svg.dataset.level = levelIdx;

  // background arc (dim grey)
  const bgArc = arcPath(cx, cy, r, 0, 1);
  const bgEl = document.createElementNS("http://www.w3.org/2000/svg", "path");
  bgEl.setAttribute("d", bgArc);
  bgEl.setAttribute("fill", "none");
  bgEl.setAttribute("stroke", "#30363d");
  bgEl.setAttribute("stroke-width", "14");
  bgEl.setAttribute("stroke-linecap", "round");

  // foreground arc (value fill)
  const fgArc = arcPath(cx, cy, r, 0, Math.max(0.02, value));
  const fgEl = document.createElementNS("http://www.w3.org/2000/svg", "path");
  fgEl.setAttribute("d", fgArc);
  fgEl.setAttribute("fill", "none");
  fgEl.setAttribute("stroke", isLocked ? "#444" : color);
  fgEl.setAttribute("stroke-width", "14");
  fgEl.setAttribute("stroke-linecap", "round");
  fgEl.setAttribute("stroke-dasharray", isActive ? "none" : "none");

  // needle line
  const angle = Math.PI - value * Math.PI; // 180° → 0° for value 0→1
  const nx = cx + r * Math.cos(angle);
  const ny = cy - r * Math.sin(angle);
  const needle = document.createElementNS("http://www.w3.org/2000/svg", "line");
  needle.setAttribute("x1", cx); needle.setAttribute("y1", cy);
  needle.setAttribute("x2", nx); needle.setAttribute("y2", ny);
  needle.setAttribute("stroke", isActive ? "#fff" : (isLocked ? "#555" : color));
  needle.setAttribute("stroke-width", isActive ? "2.5" : "1.5");
  needle.setAttribute("stroke-linecap", "round");

  // center dot
  const dot = document.createElementNS("http://www.w3.org/2000/svg", "circle");
  dot.setAttribute("cx", cx); dot.setAttribute("cy", cy); dot.setAttribute("r", "4");
  dot.setAttribute("fill", isActive ? "#fff" : color);

  // level number text
  const txt = document.createElementNS("http://www.w3.org/2000/svg", "text");
  txt.setAttribute("x", cx); txt.setAttribute("y", cy - r * 0.38);
  txt.setAttribute("text-anchor", "middle");
  txt.setAttribute("font-size", "16");
  txt.setAttribute("font-weight", "700");
  txt.setAttribute("fill", isActive ? "#fff" : (isLocked ? "#555" : color));
  txt.textContent = levelIdx;

  svg.append(bgEl, fgEl, needle, dot, txt);

  // drag interaction — convert pointer angle to needle value
  let dragging = false;
  svg.addEventListener("pointerdown", (e) => {
    if (isLocked) return;
    e.preventDefault();
    dragging = true;
    svg.setPointerCapture(e.pointerId);
    svg.style.cursor = "grabbing";
  });
  svg.addEventListener("pointermove", (e) => {
    if (!dragging) return;
    const rect = svg.getBoundingClientRect();
    const px = e.clientX - rect.left;
    const py = e.clientY - rect.top;
    const scaleX = W / rect.width, scaleY = H / rect.height;
    const dx = px * scaleX - cx, dy = py * scaleY - cy;
    let angle = Math.atan2(-dy, dx); // atan2(y flipped because SVG y-down)
    // clamp to [0, π]
    if (angle < 0) angle = 0;
    if (angle > Math.PI) angle = Math.PI;
    const newVal = 1 - angle / Math.PI;
    // update needle visually immediately (optimistic)
    const newNx = cx + r * Math.cos(Math.PI - newVal * Math.PI);
    const newNy = cy - r * Math.sin(Math.PI - newVal * Math.PI);
    needle.setAttribute("x2", newNx); needle.setAttribute("y2", newNy);
    // send to API (throttled)
    clearTimeout(svg._needleTimer);
    svg._needleTimer = setTimeout(async () => {
      if (gaugeData && levelIdx === gaugeData.level) {
        await api("/api/gauge/set", "POST", { action: "needle", needle: newVal });
        await refreshGauge();
      }
    }, 80);
  });
  svg.addEventListener("pointerup", (e) => {
    if (!dragging) return;
    dragging = false;
    svg.style.cursor = "grab";
  });

  return svg;
}

// Arc path helper: SVG arc from angle=π (left) to the position at [0,frac]*π
function arcPath(cx, cy, r, startFrac, endFrac) {
  // startFrac=0 → leftmost (180°), endFrac=1 → rightmost (0°)
  const startAngle = Math.PI;
  const endAngle = Math.PI - endFrac * Math.PI;
  const x1 = cx + r * Math.cos(startAngle);
  const y1 = cy - r * Math.sin(startAngle);
  const x2 = cx + r * Math.cos(endAngle);
  const y2 = cy - r * Math.sin(endAngle);
  const largeArc = endFrac > 0.5 ? 1 : 0;
  return `M ${x1} ${y1} A ${r} ${r} 0 ${largeArc} 1 ${x2} ${y2}`;
}

// ── gauge API helpers ────────────────────────────────────────────────────────

async function refreshGauge() {
  const data = await api("/api/gauge").catch(() => null);
  if (!data || data.error) return;
  gaugeData = data;
  updateGaugeStatus();
  // re-render any open gauge panes
  document.querySelectorAll('[id^="gauge-"]').forEach(el => {
    const pid = Number(el.id.replace("gauge-", ""));
    if (panes.get(pid)?.kind === "gauge") renderGaugePaneContent(el, data);
  });
}

function updateGaugeStatus() {
  if (!gaugeData) return;
  const def = gaugeData.current || gaugeData.levels?.[gaugeData.level];
  const name = def?.name ?? "?";
  const color = def?.color ?? "#8b949e";
  const el = document.getElementById("s-gauge");
  if (el) {
    el.textContent = `🔒 sec=${gaugeData.level} ${name}`;
    el.style.color = color;
    el.title = def?.description ?? "";
  }
}

// ── render gauge pane content ────────────────────────────────────────────────

function renderGaugePaneContent(el, data) {
  el.innerHTML = "";

  // current level summary bar
  const cur = data.current || data.levels[data.level];
  const bar = document.createElement("div");
  bar.className = "gauge-current-bar";
  const extIcon = data.external_allowed ? "🌐" : "🚫";
  bar.innerHTML =
    `<span class="glevel" style="color:${cur.color}">Lv ${data.level} — ${cur.name}</span>` +
    `  ${extIcon} external=${data.external_allowed ? "allowed" : "blocked"}` +
    `  ·  models: <b>${(data.allowed_models || []).join(", ") || "none"}</b>`;
  el.appendChild(bar);

  // 5 gauge cards
  const grid = document.createElement("div");
  grid.className = "gauge-grid";

  for (const def of data.levels) {
    const lvl = def.level;
    const isActive = lvl === data.level;
    const isLocked = data.locked_levels.includes(lvl);

    const card = document.createElement("div");
    card.className = "gauge-card" +
      (isActive ? " active" : "") +
      (isLocked ? " locked" : "");
    card.title = def.description;

    const lbl = document.createElement("div");
    lbl.className = "gauge-label";
    lbl.style.color = def.color;
    lbl.textContent = `Lv ${lvl} ${def.name}`;

    // needle value: 1.0 if below active, fractional if active, 0 if above
    let needleVal;
    if (lvl < data.level) needleVal = 1.0;
    else if (lvl === data.level) needleVal = Math.max(0.05, data.needle);
    else needleVal = 0.0;

    const svg = buildGaugeSvg(lvl, needleVal, def.color, isActive, isLocked);

    const desc = document.createElement("div");
    desc.className = "gauge-desc";
    desc.textContent = def.description;

    const models = document.createElement("div");
    models.className = "gauge-models";
    const ms = def.allowed_models || [];
    models.textContent = ms.length
      ? ms.map(m => m.split(/[-/]/)[0]).join(", ")  // short names
      : "no models";

    const btns = document.createElement("div");
    btns.className = "gauge-btns";

    const setBtn = document.createElement("button");
    setBtn.className = "tg g-set";
    setBtn.textContent = isActive ? "active" : "set";
    setBtn.disabled = isActive || isLocked;
    setBtn.onclick = async (e) => {
      e.stopPropagation();
      const r = await api("/api/gauge/set", "POST", { action: "set_level", level: lvl });
      if (r.error) return alert(r.error);
      await refreshGauge();
    };

    const lockBtn = document.createElement("button");
    lockBtn.className = "tg g-lock " + (isLocked ? "locked" : "unlocked");
    lockBtn.textContent = isLocked ? "🔒 locked" : "🔓 lock";
    lockBtn.onclick = async (e) => {
      e.stopPropagation();
      const action = isLocked ? "unlock" : "lock";
      await api("/api/gauge/set", "POST", { action, level: lvl });
      await refreshGauge();
    };

    btns.append(setBtn, lockBtn);
    card.append(lbl, svg, desc, models, btns);
    grid.appendChild(card);

    // clicking the card itself activates the level
    card.onclick = async () => {
      if (isLocked || isActive) return;
      const r = await api("/api/gauge/set", "POST", { action: "set_level", level: lvl });
      if (r.error) return alert(r.error);
      await refreshGauge();
    };
  }

  el.appendChild(grid);
}

async function loadGaugePane(pid) {
  await refreshGauge();
  const el = document.getElementById(`gauge-${pid}`);
  if (!el || !gaugeData) return;
  renderGaugePaneContent(el, gaugeData);
}

function addGaugePane() {
  const leaf = newPane("gauge");
  if (!layout) { layout = leaf; renderLayout(); return; }
  splitPane(focused ?? allPids()[0], "row", leaf);
}

function addCapsPane() {
  const leaf = newPane("capabilities");
  if (!layout) { layout = leaf; renderLayout(); return; }
  splitPane(focused ?? allPids()[0], "row", leaf);
}

function focusedState() {
  const info = focused !== null ? panes.get(focused) : null;
  if (!info || info.kind !== "terminal" || info.session === null)
    return null;
  return states.get(info.session) || null;
}

function setStatus(id, text, cls = "") {
  const el = document.getElementById(id);
  el.textContent = text; el.className = cls;
}

async function updateStatus() {
  const s = focusedState();
  if (s) {
    const c = s.counters;
    setStatus("s-mode", `mode=${s.mode}`);
    setStatus("s-blocked", `blocked=${c.blocked_commands}`,
              c.blocked_commands ? "bad" : "");
    setStatus("s-external", `external_calls=${c.external_backend_calls}`);
    setStatus("s-files", `files_sent_external=${c.files_sent_external}`,
              c.files_sent_external === 0 ? "ok" : "bad");
    setStatus("s-audit", s.audit_dir.split("/").slice(-1)[0]);
  }
  const o = await api("/api/orchestrator").catch(() => null);
  if (o && o.max_processes)
    setStatus("s-procs",
              `procs ${o.open_sessions}/${o.max_processes}`,
              o.open_sessions > o.max_processes ? "bad" : "");
}

/* ================= actions ================= */
async function createSession(mode) {
  const state = await api("/api/sessions", "POST",
    { mode: mode || document.getElementById("newmode").value });
  if (state.error) { alert(state.error); return null; }
  states.set(state.id, state);
  return state.id;
}

async function addTerminalPane(splitTarget = null, dir = "row") {
  const sid = await createSession();
  if (sid === null) return;
  const leaf = newPane("terminal", sid);
  focused = leaf.pid;
  if (!layout) { layout = leaf; renderLayout(); return; }
  splitPane(splitTarget ?? focused ?? allPids()[0], dir, leaf);
}

async function submitLine(pid) {
  const info = panes.get(pid);
  const input = document.getElementById(`in-${pid}`);
  const line = input.value; input.value = "";
  if (!line.trim() || info.session === null) return;
  const r = await api(`/api/sessions/${info.session}/input`, "POST",
                      { line });
  if (r.status === "closed") { await removePane(pid); return; }
  await refreshSession(info.session);
  renderApprovals(); updateStatus();
}

async function decide(sessionId, approve) {
  await api(`/api/sessions/${sessionId}/decision`, "POST", { approve });
  await refreshSession(sessionId);
  renderApprovals(); updateStatus();
}

async function refreshSession(sessionId) {
  const s = await api(`/api/sessions/${sessionId}/state`);
  if (s.error) return;
  states.set(sessionId, s);
  for (const pid of allPids()) {
    const info = panes.get(pid);
    if (info.kind === "terminal" && info.session === sessionId)
      renderTerminal(pid, s);
  }
}

async function refreshAll() {
  const seen = new Set();
  for (const pid of allPids()) {
    const info = panes.get(pid);
    if (info.kind === "terminal" && info.session !== null
        && !seen.has(info.session)) {
      seen.add(info.session);
      await refreshSession(info.session);
    }
  }
  renderApprovals(); updateStatus();
}

async function fillMax() {
  const mode = document.getElementById("newmode").value;
  const r = await api("/api/orchestrator/max_sessions", "POST", { mode });
  if (r.error) return alert(r.error);
  for (const sid of r.created) {
    const s = await api(`/api/sessions/${sid}/state`);
    if (!s.error) states.set(sid, s);
    newPaneForSession(sid);
  }
  const termPids = allPids().filter(
    pid => panes.get(pid).kind === "terminal");
  const extras = [...panes.keys()].filter(pid => !termPids.includes(pid)
    && panes.get(pid).kind === "terminal");
  buildTiled(termPids.concat(extras));
  focused = firstTerminalPid();
  renderLayout();
}

function newPaneForSession(sid) {
  const pid = nextPid++;
  panes.set(pid, { kind: "terminal", session: sid });
  if (!layout) layout = { type: "pane", pid };
  else {
    // attach temporarily; buildTiled() re-tiles right after
    const parent = layout.type === "split" ? layout
      : (layout = { type: "split", dir: "row", children: [layout] });
    parent.children.push({ type: "pane", pid });
  }
  return pid;
}

/* ================= context menu ================= */
const ctx = document.getElementById("ctx");

function menuItem(label, fn) {
  const div = document.createElement("div");
  div.className = "item"; div.textContent = label;
  div.onclick = () => { hideMenu(); fn(); };
  return div;
}

function openMenu(event, pid) {
  focused = pid; markFocus(); updateStatus();
  ctx.innerHTML = "";
  const label = document.createElement("div");
  label.className = "label";
  label.textContent = `pane ${pid} — ${panes.get(pid).kind}`;
  ctx.appendChild(label);
  ctx.appendChild(menuItem("⬌ split right (new terminal)",
    () => addTerminalPane(pid, "row")));
  ctx.appendChild(menuItem("⬍ split down (new terminal)",
    () => addTerminalPane(pid, "col")));
  const sep1 = document.createElement("div");
  sep1.className = "sep"; ctx.appendChild(sep1);
  ctx.appendChild(menuItem("◫ turn into approvals pane",
    () => changeKind(pid, "approvals")));
  ctx.appendChild(menuItem("♥ turn into health pane",
    () => changeKind(pid, "health")));
  ctx.appendChild(menuItem("⛭ turn into capabilities pane",
    () => changeKind(pid, "capabilities")));
  ctx.appendChild(menuItem("🔒 turn into security gauge pane",
    () => changeKind(pid, "gauge")));
  const sep2 = document.createElement("div");
  sep2.className = "sep"; ctx.appendChild(sep2);
  ctx.appendChild(menuItem("⚡ fill max terminals", fillMax));
  ctx.appendChild(menuItem("✕ close pane", () => removePane(pid)));
  ctx.style.left = Math.min(event.clientX,
    window.innerWidth - 230) + "px";
  ctx.style.top = Math.min(event.clientY,
    window.innerHeight - 240) + "px";
  ctx.style.display = "block";
}

async function changeKind(pid, kind) {
  const info = panes.get(pid);
  if (info.kind === "terminal" && info.session !== null)
    await api(`/api/sessions/${info.session}/close`, "POST", {});
  panes.set(pid, { kind, session: null });
  renderLayout();
}

function hideMenu() { ctx.style.display = "none"; }
document.addEventListener("click", hideMenu);
document.addEventListener("keydown", e => {
  if (e.key === "Escape") hideMenu();
});

/* ================= boot ================= */
document.getElementById("addbtn").onclick = () => addTerminalPane();
document.getElementById("maxbtn").onclick = fillMax;
document.getElementById("capsbtn").onclick = addCapsPane;
document.getElementById("gaugebtn").onclick = addGaugePane;

(async function boot() {
  const existing = await api("/api/sessions");
  const open = Array.isArray(existing)
    ? existing.filter(s => !s.closed) : [];
  if (open.length) {
    for (const s of open) {
      const full = await api(`/api/sessions/${s.id}/state`);
      if (!full.error) states.set(s.id, full);
      newPaneForSession(s.id);
    }
    buildTiled(allPids());
    focused = firstTerminalPid();
    renderLayout();
  } else {
    await addTerminalPane();
  }
  loadCapsSummary();             // cached; status bar costs zero tokens
  setInterval(loadCapsSummary, 30000);
  refreshGauge();                // security gauge (initial)
  setInterval(refreshGauge, 15000);
  setInterval(refreshAll, 2000);
})();
</script>
