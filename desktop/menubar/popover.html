<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Surfing AI</title>
<style>
  /* Soft UI / Neumorphism status popover for the menu-bar app.
     Minimal surface, paired soft shadows, tactile pills & buttons. */
  :root {
    --bg: #e7ebf3; --surface: #eceff5; --ink: #33445c; --muted: #7d8aa1;
    --accent: #1f9486; --dark: #c3c9d6; --light: #ffffff;
    --out: 6px 6px 14px var(--dark), -6px -6px 14px var(--light);
    --out-sm: 3px 3px 7px var(--dark), -3px -3px 7px var(--light);
    --in: inset 3px 3px 7px var(--dark), inset -3px -3px 7px var(--light);
    --in-sm: inset 2px 2px 5px var(--dark), inset -2px -2px 5px var(--light);
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    width: 320px; padding: 16px;
    font: 13px -apple-system, "SF Pro Text", Inter, sans-serif;
    color: var(--ink);
    background:
      radial-gradient(circle at 50% -20%, #f4f7fc, transparent 22rem),
      var(--bg);
  }
  .head { display: flex; align-items: center; gap: 11px; margin-bottom: 14px; }
  .badge {
    width: 40px; height: 40px; border-radius: 13px; flex: none;
    background: var(--surface); box-shadow: var(--out-sm);
    display: grid; place-items: center;
  }
  .badge svg { width: 24px; height: 24px; }
  .title { font-weight: 700; letter-spacing: .02em; }
  .sub { color: var(--muted); font-size: 11px; margin-top: 1px;
         display: flex; align-items: center; gap: 6px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent);
         box-shadow: 0 0 8px rgba(31,148,134,.7); }

  .card { background: var(--surface); border-radius: 15px;
          box-shadow: var(--out); padding: 12px 13px; margin-bottom: 12px; }
  .label { font-size: 10px; text-transform: uppercase; letter-spacing: .09em;
           color: var(--muted); margin-bottom: 9px; }

  .pills { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .pill {
    border: 0; border-radius: 11px; padding: 8px 0; font: inherit;
    font-size: 12px; font-weight: 600; color: var(--muted);
    background: var(--surface); box-shadow: var(--out-sm); cursor: pointer;
    transition: box-shadow .15s ease, color .15s ease;
  }
  .pill:hover { color: var(--ink); }
  .pill.active { color: var(--accent); box-shadow: var(--in-sm); }
  .pill small { display: block; font-size: 9px; font-weight: 500;
                color: var(--muted); margin-top: 2px; }

  .health { display: flex; align-items: center; gap: 9px; color: var(--ink);
            font-size: 12px; }
  .health .well { flex: 1; background: var(--bg); border-radius: 10px;
                  box-shadow: var(--in-sm); padding: 7px 10px; color: var(--muted);
                  font-family: "SF Mono", Menlo, monospace; font-size: 11px; }

  .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .btn { border: 0; border-radius: 12px; padding: 10px; font: inherit;
         font-weight: 600; cursor: pointer; background: var(--surface);
         color: var(--ink); box-shadow: var(--out-sm);
         transition: box-shadow .15s ease, transform .15s ease; }
  .btn:hover { transform: translateY(-1px); box-shadow: var(--out); }
  .btn:active { box-shadow: var(--in-sm); transform: none; }
  .btn.primary {
    color: #fff;
    background: linear-gradient(145deg, #2bc0ac, #1f9486);
    box-shadow: var(--out-sm), inset 0 1px 0 rgba(255,255,255,.4);
  }
  .foot { display: flex; justify-content: space-between; align-items: center;
          margin-top: 12px; color: var(--muted); font-size: 11px; }
  .quit { border: 0; background: transparent; color: var(--muted);
          font: inherit; cursor: pointer; }
  .quit:hover { color: #e2604f; }
</style>
</head>
<body>
  <div class="head">
    <div class="badge">
      <svg viewBox="0 0 48 48" aria-hidden="true">
        <defs>
          <linearGradient id="s" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#ff8b73"/>
            <stop offset="1" stop-color="#1f9486"/>
          </linearGradient>
        </defs>
        <circle cx="24" cy="17" r="6" fill="url(#s)"/>
        <path d="M8 30c6-4 10 4 16 0s10-4 16 0" fill="none"
              stroke="#1f9486" stroke-width="3.4" stroke-linecap="round"/>
        <path d="M8 38c6-4 10 4 16 0s10-4 16 0" fill="none"
              stroke="#3aa0e6" stroke-width="3.4" stroke-linecap="round"
              opacity=".7"/>
      </svg>
    </div>
    <div>
      <div class="title">Surfing AI</div>
      <div class="sub"><span class="dot"></span> private workspace · localhost</div>
    </div>
  </div>

  <div class="card">
    <div class="label">Thread budget</div>
    <div class="pills" id="pills">
      <button class="pill" data-p="20">20%<small>—</small></button>
      <button class="pill active" data-p="50">50%<small>—</small></button>
      <button class="pill" data-p="60">60%<small>—</small></button>
      <button class="pill" data-p="70">70%<small>—</small></button>
      <button class="pill" data-p="80">80%<small>—</small></button>
      <button class="pill" data-p="90">90%<small>—</small></button>
      <button class="pill" data-p="100">100%<small>—</small></button>
    </div>
  </div>

  <div class="card">
    <div class="label">Backend health</div>
    <div class="health">
      <span class="dot"></span>
      <div class="well" id="health">claude: present · audit: ok</div>
    </div>
  </div>

  <div class="actions">
    <button class="btn primary" onclick="act('open')">Open Console</button>
    <button class="btn" onclick="act('approvals')">Approvals</button>
  </div>

  <div class="foot">
    <span id="proc">files_sent_external = 0</span>
    <button class="quit" onclick="act('quit')">Quit</button>
  </div>

<script>
  // Fill worker counts for each pill from the host's logical thread count.
  // window.cpuThreads may be injected by the host webview; fall back to 8.
  const threads = window.cpuThreads || (navigator.hardwareConcurrency || 8);
  document.querySelectorAll('.pill').forEach(b => {
    const p = +b.dataset.p;
    const w = Math.max(1, Math.min(threads, Math.round(threads * p / 100)));
    b.querySelector('small').textContent = w + (w === 1 ? ' worker' : ' workers');
  });
  const pills = document.getElementById('pills');
  pills.addEventListener('click', e => {
    const b = e.target.closest('.pill'); if (!b) return;
    pills.querySelectorAll('.pill').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    act('threads:' + b.dataset.p);
  });
  // Bridge to the host (rumps/webview can intercept this scheme).
  function act(cmd) {
    if (window.surfing && window.surfing.invoke) return window.surfing.invoke(cmd);
    try { location.href = 'surfing://' + cmd; } catch (e) {}
  }
</script>
</body>
</html>
