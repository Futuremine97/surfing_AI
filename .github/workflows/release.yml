name: Publish release download

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Run tests
        run: python scripts/run_tests.py

      - name: Build downloadable ZIP
        run: |
          python scripts/build_release.py --output dist/surfing-ai.zip
          sha256sum dist/surfing-ai.zip > dist/surfing-ai.zip.sha256

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            dist/surfing-ai.zip \
            dist/surfing-ai.zip.sha256 \
            --verify-tag \
            --generate-notes \
            --title "Surfing AI ${GITHUB_REF_NAME}"
